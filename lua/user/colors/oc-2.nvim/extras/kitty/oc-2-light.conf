# vim:ft=kitty

## name:     OC-2 Light
## author:   Port of opencode's oc-2 theme
## license:  MIT
## upstream: https://github.com/anomalyco/opencode/blob/dev/packages/ui/src/theme/themes/oc-2.json
## blurb:    Crisp, warm light theme pulled from opencode's default UI

# Basic colors
foreground              #6F6F6F
background              #F8F8F8
selection_foreground    #171717
selection_background    #fbe891

# Cursor
cursor                  #ff8c00
cursor_text_color       #F8F8F8

# URL / bell
url_color               #007b80
bell_border_color       #b0851f

# Window borders
active_border_color     #ff8c00
inactive_border_color   #c1c0c0

# Tab bar
active_tab_foreground   #F8F8F8
active_tab_background   #ff8c00
inactive_tab_foreground #6F6F6F
inactive_tab_background #F3F3F3
tab_bar_background      #f8f8f8
tab_bar_margin_color    #f8f8f8

# Marks
mark1_foreground #F8F8F8
mark1_background #ff8c00
mark2_foreground #F8F8F8
mark2_background #a753ae
mark3_foreground #F8F8F8
mark3_background #007b80

# The 16 terminal colors

# black
color0 #171311
color8 #c7c7c7

# red
color1 #fc533a
color9 #ea4129

# green
color2  #12c905
color10 #20b618

# yellow
color3  #b0851f
color11 #8a6f00

# blue
color4  #034cff
color12 #0949e6

# magenta
color5  #a753ae
color13 #97449e

# cyan
color6  #007b80
color14 #0a6e72

# white
color7  #6f6f6f
color15 #000000
